<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지식지갑 — 웹디자인팀</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  :root {
    --pico-font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    --pico-background-color: #f7f7f5;
    --pico-card-background-color: #ffffff;
    --pico-card-border-color: #e8e8e4;
    --pico-border-radius: 10px;
    --pico-primary: #2563eb;
    --pico-primary-hover: #1d4ed8;

    --col-figma:    #3a7d44;
    --col-adobe:    #b84c1a;
    --col-industry: #7b3fa0;
    --col-design:   #1a5fa0;
    --col-trend:    #a06020;
    --col-frontend: #1a7a7a;
    --col-ai:       #c2185b;   /* AI — 딥핑크/로즈 */

    --bg-figma:    rgba(58,125,68,0.08);
    --bg-adobe:    rgba(184,76,26,0.08);
    --bg-industry: rgba(123,63,160,0.08);
    --bg-design:   rgba(26,95,160,0.08);
    --bg-trend:    rgba(160,96,32,0.08);
    --bg-frontend: rgba(26,122,122,0.08);
    --bg-ai:       rgba(194,24,91,0.08);
  }

  * { box-sizing: border-box; }

  body {
    background: var(--pico-background-color);
    font-family: var(--pico-font-family);
    margin: 0;
    padding: 0;
  }

  /* ── 헤더 ── */
  .site-header {
    background: rgba(247,247,245,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid #e0e0dc;
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 0 2rem;
  }

  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .site-logo {
    font-family: 'GmarketSans', 'Noto Sans KR', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #111;
    display: flex;
    align-items: baseline;
    gap: 8px;
    text-decoration: none;
  }

  .site-logo span {
    font-size: 0.72rem;
    font-weight: 400;
    color: #999;
    font-family: 'Pretendard', sans-serif;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .update-badge { font-size: 0.72rem; color: #aaa; }

  .refresh-btn {
    font-size: 0.75rem;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid #d0d0cc;
    background: transparent;
    color: #666;
    cursor: pointer;
    font-family: 'Pretendard', sans-serif;
    transition: all 0.2s;
  }

  .refresh-btn:hover {
    border-color: var(--pico-primary);
    color: var(--pico-primary);
    background: rgba(37,99,235,0.04);
  }

  /* ── 필터 바 ── */
  .filter-wrap {
    background: #fff;
    border-bottom: 1px solid #eee;
    padding: 0 2rem;
  }

  .filter-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    gap: 6px;
    padding: 12px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .filter-inner::-webkit-scrollbar { display: none; }

  .filter-btn {
    white-space: nowrap;
    padding: 5px 16px;
    border-radius: 20px;
    border: 1px solid #ddd;
    background: transparent;
    color: #666;
    font-size: 0.8rem;
    font-family: 'Pretendard', sans-serif;
    cursor: pointer;
    transition: all 0.18s;
    flex-shrink: 0;
  }

  .filter-btn:hover { border-color: #bbb; color: #333; background: #f9f9f9; }

  .filter-btn.active { font-weight: 600; border-color: transparent; }

  .filter-btn[data-cat="all"].active      { background: #111; color: #fff; }
  .filter-btn[data-cat="figma"].active    { background: var(--col-figma);    color: #fff; border-color: var(--col-figma); }
  .filter-btn[data-cat="adobe"].active    { background: var(--col-adobe);    color: #fff; border-color: var(--col-adobe); }
  .filter-btn[data-cat="industry"].active { background: var(--col-industry); color: #fff; border-color: var(--col-industry); }
  .filter-btn[data-cat="design"].active   { background: var(--col-design);   color: #fff; border-color: var(--col-design); }
  .filter-btn[data-cat="trend"].active    { background: var(--col-trend);    color: #fff; border-color: var(--col-trend); }
  .filter-btn[data-cat="frontend"].active { background: var(--col-frontend); color: #fff; border-color: var(--col-frontend); }
  .filter-btn[data-cat="ai"].active       { background: var(--col-ai);       color: #fff; border-color: var(--col-ai); }

  /* ── 메인 ── */
  .main-wrap {
    max-width: 1280px;
    margin: 0 auto;
    padding: 28px 2rem;
  }

  .section-meta {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 20px;
  }

  .section-title {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #999;
  }

  .section-count { font-size: 0.72rem; color: #ccc; }

  /* ── 카드 그리드 ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }

  /* ── 카드 ── */
  .news-card {
    background: #fff;
    border: 1px solid #e8e8e4;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.35s ease both;
  }

  .news-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.07);
    border-color: #d0d0cc;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-accent { height: 3px; }
  .card-body { padding: 16px 18px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .card-top { display: flex; justify-content: space-between; align-items: center; }

  .cat-chip {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }

  .card-date { font-size: 0.7rem; color: #bbb; }

  .card-title {
    font-size: 0.9rem;
    font-weight: 700;
    line-height: 1.5;
    color: #111;
    word-break: keep-all;
    margin: 0;
  }

  .card-summary {
    font-size: 0.8rem;
    color: #666;
    line-height: 1.7;
    word-break: keep-all;
    margin: 0;
    flex: 1;
  }

  .card-keywords { display: flex; flex-wrap: wrap; gap: 5px; }

  .kw-tag {
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 4px;
    background: #f4f4f2;
    color: #888;
    border: 1px solid #eee;
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 10px;
    border-top: 1px solid #f0f0ee;
    margin-top: auto;
  }

  .card-source { font-size: 0.7rem; color: #bbb; }

  .card-link {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--pico-primary);
    text-decoration: none;
  }

  /* 분류별 accent */
  .card-figma    .card-accent { background: var(--col-figma); }
  .card-adobe    .card-accent { background: var(--col-adobe); }
  .card-industry .card-accent { background: var(--col-industry); }
  .card-design   .card-accent { background: var(--col-design); }
  .card-trend    .card-accent { background: var(--col-trend); }
  .card-frontend .card-accent { background: var(--col-frontend); }
  .card-ai       .card-accent { background: var(--col-ai); }

  .chip-figma    { background: var(--bg-figma);    color: var(--col-figma); }
  .chip-adobe    { background: var(--bg-adobe);    color: var(--col-adobe); }
  .chip-industry { background: var(--bg-industry); color: var(--col-industry); }
  .chip-design   { background: var(--bg-design);   color: var(--col-design); }
  .chip-trend    { background: var(--bg-trend);    color: var(--col-trend); }
  .chip-frontend { background: var(--bg-frontend); color: var(--col-frontend); }
  .chip-ai       { background: var(--bg-ai);       color: var(--col-ai); }

  /* ── 로딩 ── */
  .loading-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: #bbb;
    font-size: 0.85rem;
  }

  .dots span {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--pico-primary);
    margin: 0 3px;
    animation: dot 1.2s infinite;
    opacity: 0.3;
  }

  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot {
    0%,80%,100% { transform: translateY(0); opacity: 0.3; }
    40% { transform: translateY(-7px); opacity: 1; }
  }

  /* ── 모달 오버레이 ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,10,0.55);
    backdrop-filter: blur(6px);
    z-index: 999;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: overlayIn 0.2s ease;
  }

  .modal-overlay.open { display: flex; }

  @keyframes overlayIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── 모달 패널 ── */
  .modal-panel {
    background: #ffffff;
    border-radius: 20px;
    max-width: 580px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 32px 80px rgba(0,0,0,0.22);
    animation: modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal-accent-bar { height: 5px; border-radius: 20px 20px 0 0; }
  .modal-inner { padding: 30px 32px 32px; }

  .modal-header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 18px;
  }

  .modal-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .modal-close-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #f4f4f2;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    color: #888;
    flex-shrink: 0;
    transition: background 0.15s;
    line-height: 1;
    padding: 0;
  }

  .modal-close-btn:hover { background: #eee; color: #333; }

  .modal-title-big {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.45;
    color: #0f0f0f;
    word-break: keep-all;
    margin: 0 0 6px;
  }

  .modal-source-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }

  .modal-source-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .modal-source-text { font-size: 0.78rem; color: #aaa; }
  .modal-date-text   { font-size: 0.78rem; color: #ccc; }

  .modal-divider { border: none; border-top: 1px solid #f0f0ee; margin: 20px 0; }

  .modal-section-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: #bbb;
    margin: 0 0 10px;
  }

  .modal-summary-text {
    font-size: 0.9rem;
    color: #333;
    line-height: 1.85;
    word-break: keep-all;
    margin: 0;
  }

  .modal-point-list {
    list-style: none;
    padding: 0; margin: 0;
    display: flex; flex-direction: column; gap: 10px;
  }

  .modal-point-list li {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    font-size: 0.85rem;
    color: #444;
    line-height: 1.65;
  }

  .modal-point-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-top: 7px;
    flex-shrink: 0;
  }

  .modal-keywords-wrap { display: flex; flex-wrap: wrap; gap: 6px; }

  .modal-kw-tag {
    font-size: 0.75rem;
    padding: 4px 12px;
    border-radius: 20px;
    background: #f4f4f2;
    color: #777;
    border: 1px solid #ebebeb;
  }

  .modal-footer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 20px;
    border-top: 1px solid #f0f0ee;
    margin-top: 4px;
  }

  .modal-go-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    font-weight: 700;
    padding: 11px 22px;
    border-radius: 10px;
    background: var(--pico-primary);
    color: #fff;
    text-decoration: none;
    transition: background 0.18s, transform 0.15s;
    font-family: 'Pretendard', sans-serif;
    border: none;
  }

  .modal-go-btn:hover { background: var(--pico-primary-hover); transform: translateY(-1px); }

  .modal-share-btn {
    font-size: 0.8rem;
    color: #aaa;
    background: none;
    border: 1px solid #eee;
    border-radius: 8px;
    padding: 10px 16px;
    cursor: pointer;
    font-family: 'Pretendard', sans-serif;
    transition: all 0.15s;
  }

  .modal-share-btn:hover { border-color: #ccc; color: #666; }

  /* ── 반응형 ── */
  @media (max-width: 600px) {
    .site-header, .filter-wrap { padding: 0 1rem; }
    .main-wrap { padding: 20px 1rem; }
    .card-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- 헤더 -->
<header class="site-header">
  <div class="header-inner">
    <a class="site-logo" href="#">지식지갑 <span>웹디자인팀</span></a>
    <div class="header-right">
      <span class="update-badge" id="updateTime"></span>
      <button class="refresh-btn" onclick="loadNews()">↻ 새로고침</button>
    </div>
  </div>
</header>

<!-- 필터 -->
<div class="filter-wrap">
  <div class="filter-inner">
    <button class="filter-btn active" data-cat="all"      onclick="setFilter('all',this)">전체</button>
    <button class="filter-btn"        data-cat="figma"    onclick="setFilter('figma',this)">피그마 신기능</button>
    <button class="filter-btn"        data-cat="adobe"    onclick="setFilter('adobe',this)">어도비 신기능</button>
    <button class="filter-btn"        data-cat="ai"       onclick="setFilter('ai',this)">🤖 AI 뉴스</button>
    <button class="filter-btn"        data-cat="industry" onclick="setFilter('industry',this)">업계동향</button>
    <button class="filter-btn"        data-cat="design"   onclick="setFilter('design',this)">디자인</button>
    <button class="filter-btn"        data-cat="trend"    onclick="setFilter('trend',this)">트렌드</button>
    <button class="filter-btn"        data-cat="frontend" onclick="setFilter('frontend',this)">프론트엔드</button>
  </div>
</div>

<!-- 메인 -->
<main class="main-wrap">
  <div class="section-meta">
    <span class="section-title">오늘의 지식</span>
    <span class="section-count" id="cardCount"></span>
  </div>
  <div class="card-grid" id="cardGrid">
    <div class="loading-state">
      <div class="dots"><span></span><span></span><span></span></div>
      <p style="margin-top:14px;">뉴스를 불러오는 중이에요</p>
    </div>
  </div>
</main>

<!-- 모달 오버레이 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-panel" id="modalPanel">
    <div class="modal-accent-bar" id="modalAccentBar"></div>
    <div class="modal-inner">

      <div class="modal-header-row">
        <div class="modal-meta">
          <span class="cat-chip" id="modalChip"></span>
          <span class="modal-date-text" id="modalDate"></span>
        </div>
        <button class="modal-close-btn" onclick="closeModalDirect()">✕</button>
      </div>

      <h2 class="modal-title-big" id="modalTitle"></h2>

      <div class="modal-source-row">
        <span class="modal-source-dot" id="modalSourceDot"></span>
        <span class="modal-source-text" id="modalSource"></span>
        <span class="modal-date-text">에서 발행</span>
      </div>

      <hr class="modal-divider">

      <p class="modal-section-label">핵심 요약</p>
      <p class="modal-summary-text" id="modalSummary"></p>

      <hr class="modal-divider">

      <p class="modal-section-label">상세 내용</p>
      <ul class="modal-point-list" id="modalPoints"></ul>

      <hr class="modal-divider">

      <p class="modal-section-label">관련 키워드</p>
      <div class="modal-keywords-wrap" id="modalKeywords"></div>

      <div class="modal-footer-row">
        <button class="modal-share-btn" onclick="copyLink()">🔗 링크 복사</button>
        <a href="#" class="modal-go-btn" id="modalLink" target="_blank" rel="noopener">원문 보러가기 →</a>
      </div>

    </div>
  </div>
</div>

<script>
  const CAT_LABEL = {
    figma:    '피그마 신기능',
    adobe:    '어도비 신기능',
    ai:       '🤖 AI 뉴스',
    industry: '업계동향',
    design:   '디자인',
    trend:    '트렌드',
    frontend: '프론트엔드'
  };

  const CAT_COLOR = {
    figma:    '#3a7d44',
    adobe:    '#b84c1a',
    ai:       '#c2185b',
    industry: '#7b3fa0',
    design:   '#1a5fa0',
    trend:    '#a06020',
    frontend: '#1a7a7a'
  };

  let allCards = [];
  let currentFilter = 'all';

  async function loadNews() {
    const grid = document.getElementById('cardGrid');
    grid.innerHTML = `<div class="loading-state"><div class="dots"><span></span><span></span><span></span></div><p style="margin-top:14px;">뉴스를 불러오는 중이에요</p></div>`;

    try {
      const res = await fetch('news.json?t=' + Date.now());
      if (!res.ok) throw new Error('no file');
      const data = await res.json();
      allCards = data.articles || [];
      document.getElementById('updateTime').textContent = data.updated ? '업데이트 ' + data.updated : '';
    } catch {
      allCards = getSampleData();
      document.getElementById('updateTime').textContent = '샘플 데이터';
    }

    renderCards();
  }

  function renderCards() {
    const grid = document.getElementById('cardGrid');
    const list = currentFilter === 'all' ? allCards : allCards.filter(c => c.category === currentFilter);

    document.getElementById('cardCount').textContent = list.length + '개';

    if (!list.length) {
      grid.innerHTML = `<div class="loading-state" style="color:#ccc;">해당 분야의 뉴스가 없어요</div>`;
      return;
    }

    grid.innerHTML = list.map((card, i) => {
      const idx = allCards.indexOf(card);
      return `
        <article class="news-card card-${card.category}" style="animation-delay:${i * 0.04}s" onclick="openModal(${idx})">
          <div class="card-accent"></div>
          <div class="card-body">
            <div class="card-top">
              <span class="cat-chip chip-${card.category}">${CAT_LABEL[card.category] || card.category}</span>
              <span class="card-date">${card.date}</span>
            </div>
            <p class="card-title">${card.title}</p>
            <p class="card-summary">${card.summary}</p>
            <div class="card-keywords">
              ${(card.keywords || []).map(k => `<span class="kw-tag"># ${k}</span>`).join('')}
            </div>
            <div class="card-footer">
              <span class="card-source">${card.source}</span>
              <span class="card-link">자세히 보기 →</span>
            </div>
          </div>
        </article>`;
    }).join('');
  }

  function setFilter(cat, btn) {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards();
  }

  function openModal(idx) {
    const card = allCards[idx];
    const col  = CAT_COLOR[card.category] || '#888';

    document.getElementById('modalAccentBar').style.background = col;
    document.getElementById('modalSourceDot').style.background  = col;
    document.getElementById('modalChip').textContent   = CAT_LABEL[card.category] || card.category;
    document.getElementById('modalChip').className     = `cat-chip chip-${card.category}`;
    document.getElementById('modalDate').textContent   = card.date;
    document.getElementById('modalTitle').textContent  = card.title;
    document.getElementById('modalSource').textContent = card.source;
    document.getElementById('modalLink').href = card.url || '#';

    document.getElementById('modalSummary').textContent = card.summary || '';

    const full = card.summary_full || card.summary || '';
    const sentences = full.split(/(?<=[.!?])\s+/).filter(s => s.trim().length > 5);
    document.getElementById('modalPoints').innerHTML = sentences.map(s =>
      `<li><span class="modal-point-dot" style="background:${col};opacity:0.5;"></span><span>${s.trim()}</span></li>`
    ).join('') || `<li><span class="modal-point-dot" style="background:${col};opacity:0.5;"></span><span>${full}</span></li>`;

    document.getElementById('modalKeywords').innerHTML =
      (card.keywords || []).map(k => `<span class="modal-kw-tag"># ${k}</span>`).join('');

    window._currentModalUrl = card.url || location.href;
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
  }

  function closeModalDirect() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function copyLink() {
    const url = window._currentModalUrl || location.href;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('.modal-share-btn');
      const orig = btn.textContent;
      btn.textContent = '✅ 복사됐어요!';
      setTimeout(() => btn.textContent = orig, 2000);
    });
  }
