<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지식지갑 — 웹디자인팀</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gmarket-sans@1.0.0/dist/GmarketSans.css">
<style>
  :root {
    --bg: #f0f0ed;
    --surface: #e8e8e4;
    --card: #ffffff;
    --border: #ddddd8;
    --accent: #5a6af0;
    --accent2: #5a6af0;
    --text: #1a1a1a;
    --text-muted: #666;
    --text-dim: #aaa;

    /* 태그 텍스트 색 */
    --tag-figma:    #3a7d44;
    --tag-adobe:    #b84c1a;
    --tag-industry: #7b3fa0;
    --tag-design:   #1a5fa0;
    --tag-trend:    #a06020;
    --tag-frontend: #1a7a7a;

    /* 카드 배경 파스텔 */
    --card-figma:    #e8f7ec;
    --card-adobe:    #fdeee6;
    --card-industry: #f2e8fa;
    --card-design:   #e6f0fb;
    --card-trend:    #fdf4e3;
    --card-frontend: #e6f7f7;

    /* 카드 보더 */
    --border-figma:    #b8dfc0;
    --border-adobe:    #f5c4a8;
    --border-industry: #d4b0e8;
    --border-design:   #a8c8f0;
    --border-trend:    #f0d89a;
    --border-frontend: #a0d8d8;

    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(240,240,237,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'GmarketSans', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo span {
    color: var(--text-muted);
    font-family: 'Pretendard', sans-serif;
    font-size: 12px;
    font-weight: 300;
    margin-left: 8px;
    letter-spacing: 0;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .update-time {
    font-size: 12px;
    color: var(--text-dim);
  }

  .refresh-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Pretendard', sans-serif;
    transition: all 0.2s;
  }

  .refresh-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Filter Bar */
  .filter-bar {
    padding: 20px 32px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }

  .filter-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    font-family: 'Pretendard', sans-serif;
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: var(--text-muted); color: var(--text); }

  .filter-btn.active-all      { background: var(--accent);    border-color: var(--accent);    color: #fff; font-weight: 700; }
  .filter-btn.active-figma    { background: var(--card-figma);    border-color: var(--border-figma);    color: var(--tag-figma);    font-weight: 700; }
  .filter-btn.active-adobe    { background: var(--card-adobe);    border-color: var(--border-adobe);    color: var(--tag-adobe);    font-weight: 700; }
  .filter-btn.active-industry { background: var(--card-industry); border-color: var(--border-industry); color: var(--tag-industry); font-weight: 700; }
  .filter-btn.active-design   { background: var(--card-design);   border-color: var(--border-design);   color: var(--tag-design);   font-weight: 700; }
  .filter-btn.active-trend    { background: var(--card-trend);    border-color: var(--border-trend);    color: var(--tag-trend);    font-weight: 700; }
  .filter-btn.active-frontend { background: var(--card-frontend); border-color: var(--border-frontend); color: var(--tag-frontend); font-weight: 700; }

  /* Main Grid */
  main {
    padding: 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 24px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .section-count {
    font-size: 12px;
    color: var(--text-dim);
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0;
    transition: opacity 0.25s;
  }

  .card[data-category="figma"]    { border-color: var(--border-figma); }
  .card[data-category="adobe"]    { border-color: var(--border-adobe); }
  .card[data-category="industry"] { border-color: var(--border-industry); }
  .card[data-category="design"]   { border-color: var(--border-design); }
  .card[data-category="trend"]    { border-color: var(--border-trend); }
  .card[data-category="frontend"] { border-color: var(--border-frontend); }

  .card[data-category="figma"]::before    { background: var(--tag-figma); }
  .card[data-category="adobe"]::before    { background: var(--tag-adobe); }
  .card[data-category="industry"]::before { background: var(--tag-industry); }
  .card[data-category="design"]::before   { background: var(--tag-design); }
  .card[data-category="trend"]::before    { background: var(--tag-trend); }
  .card[data-category="frontend"]::before { background: var(--tag-frontend); }

  .card:hover {
    border-color: #bbb;
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.10);
  }

  .card:hover::before { opacity: 1; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .tag {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  .tag-figma    { background: rgba(58,125,68,0.12);   color: var(--tag-figma); }
  .tag-adobe    { background: rgba(184,76,26,0.12);   color: var(--tag-adobe); }
  .tag-industry { background: rgba(123,63,160,0.12);  color: var(--tag-industry); }
  .tag-design   { background: rgba(26,95,160,0.12);   color: var(--tag-design); }
  .tag-trend    { background: rgba(160,96,32,0.12);   color: var(--tag-trend); }
  .tag-frontend { background: rgba(26,122,122,0.12);  color: var(--tag-frontend); }

  .card-date {
    font-size: 11px;
    color: var(--text-dim);
  }

  .card-title {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.45;
    color: var(--text);
    word-break: keep-all;
  }

  .card-summary {
    font-size: 13px;
    line-height: 1.75;
    color: var(--text-muted);
    word-break: keep-all;
    flex: 1;
  }

  .card-keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .keyword {
    font-size: 11px;
    color: var(--text-muted);
    background: rgba(0,0,0,0.06);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 12px;
    border-top: 1px solid rgba(0,0,0,0.08);
    margin-top: auto;
  }

  .card-source {
    font-size: 11px;
    color: var(--text-dim);
  }

  .card-link {
    font-size: 12px;
    color: var(--accent2);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
  }

  .card-link:hover { color: var(--accent); }

  /* Empty / Loading */
  .loading {
    text-align: center;
    padding: 80px 32px;
    color: var(--text-dim);
  }

  .loading-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin: 0 3px;
    animation: bounce 1.2s infinite;
  }

  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-8px); opacity: 1; }
  }

  .empty {
    text-align: center;
    padding: 80px 32px;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 20px;
    max-width: 600px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 36px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    animation: modalIn 0.25s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 20px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 24px;
    cursor: pointer;
    line-height: 1;
  }

  .modal-tag-row { display: flex; gap: 8px; align-items: center; }
  .modal-date { font-size: 12px; color: var(--text-dim); }

  .modal-title {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.4;
    word-break: keep-all;
  }

  .modal-summary {
    font-size: 14px;
    line-height: 1.85;
    color: var(--text-muted);
    word-break: keep-all;
  }

  .modal-keywords { display: flex; flex-wrap: wrap; gap: 6px; }

  .modal-footer {
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-source { font-size: 12px; color: var(--text-dim); }

  .modal-link-btn {
    background: var(--accent);
    color: #fff;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 8px;
    text-decoration: none;
    transition: opacity 0.2s;
    font-family: 'Pretendard', sans-serif;
  }

  .modal-link-btn:hover { opacity: 0.85; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

  @media (max-width: 600px) {
    header { padding: 0 16px; }
    .filter-bar { padding: 16px; }
    main { padding: 16px; }
    .card-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    지식지갑
    <span>웹디자인팀</span>
  </div>
  <div class="header-right">
    <span class="update-time" id="updateTime">불러오는 중...</span>
    <button class="refresh-btn" onclick="loadNews()">↻ 새로고침</button>
  </div>
</header>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active-all" data-filter="all" onclick="setFilter('all', this)">전체</button>
  <button class="filter-btn" data-filter="figma" onclick="setFilter('figma', this)">피그마 신기능</button>
  <button class="filter-btn" data-filter="adobe" onclick="setFilter('adobe', this)">어도비 신기능</button>
  <button class="filter-btn" data-filter="industry" onclick="setFilter('industry', this)">업계동향</button>
  <button class="filter-btn" data-filter="design" onclick="setFilter('design', this)">디자인</button>
  <button class="filter-btn" data-filter="trend" onclick="setFilter('trend', this)">트렌드</button>
  <button class="filter-btn" data-filter="frontend" onclick="setFilter('frontend', this)">프론트엔드</button>
</div>

<main>
  <div class="section-header">
    <span class="section-title">오늘의 지식</span>
    <span class="section-count" id="cardCount"></span>
  </div>
  <div class="card-grid" id="cardGrid">
    <div class="loading">
      <div>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>
      <p style="margin-top:16px; font-size:13px;">뉴스를 불러오는 중이에요</p>
    </div>
  </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-tag-row">
      <span class="tag" id="modalTag"></span>
      <span class="modal-date" id="modalDate"></span>
    </div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-summary" id="modalSummary"></div>
    <div class="modal-keywords" id="modalKeywords"></div>
    <div class="modal-footer">
      <span class="modal-source" id="modalSource"></span>
      <a href="#" class="modal-link-btn" id="modalLink" target="_blank">원문 보기 →</a>
    </div>
  </div>
</div>

<script>
  let allCards = [];
  let currentFilter = 'all';

  const tagClass = {
    figma:    'tag-figma',
    adobe:    'tag-adobe',
    industry: 'tag-industry',
    design:   'tag-design',
    trend:    'tag-trend',
    frontend: 'tag-frontend'
  };

  const tagLabel = {
    figma:    '피그마 신기능',
    adobe:    '어도비 신기능',
    industry: '업계동향',
    design:   '디자인',
    trend:    '트렌드',
    frontend: '프론트엔드'
  };

  async function loadNews() {
    const grid = document.getElementById('cardGrid');
    grid.innerHTML = `<div class="loading">
      <div><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>
      <p style="margin-top:16px;font-size:13px;">뉴스를 불러오는 중이에요</p>
    </div>`;

    try {
      const res = await fetch('news.json?t=' + Date.now());
      if (!res.ok) throw new Error('no file');
      const data = await res.json();
      allCards = data.articles || [];
      document.getElementById('updateTime').textContent = data.updated ? '업데이트: ' + data.updated : '';
      renderCards();
    } catch(e) {
      // 샘플 데이터 (실제 운영 전 미리보기용)
      allCards = getSampleData();
      document.getElementById('updateTime').textContent = '샘플 데이터';
      renderCards();
    }
  }

  function renderCards() {
    const grid = document.getElementById('cardGrid');
    const filtered = currentFilter === 'all'
      ? allCards
      : allCards.filter(c => c.category === currentFilter);

    document.getElementById('cardCount').textContent = filtered.length + '개';

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty">해당 분야의 뉴스가 없어요</div>';
      return;
    }

    grid.innerHTML = filtered.map((card, i) => `
      <div class="card" data-category="${card.category}" style="animation-delay:${i * 0.05}s" onclick="openModal(${allCards.indexOf(card)})">
        <div class="card-top">
          <span class="tag ${tagClass[card.category]}">${tagLabel[card.category]}</span>
          <span class="card-date">${card.date}</span>
        </div>
        <div class="card-title">${card.title}</div>
        <div class="card-summary">${card.summary}</div>
        <div class="card-keywords">
          ${(card.keywords || []).map(k => `<span class="keyword"># ${k}</span>`).join('')}
        </div>
        <div class="card-footer">
          <span class="card-source">${card.source}</span>
          <span class="card-link">자세히 보기 →</span>
        </div>
      </div>
    `).join('');
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.className = 'filter-btn';
    });
    btn.className = `filter-btn active-${filter}`;
    renderCards();
  }

  function openModal(idx) {
    const card = allCards[idx];
    document.getElementById('modalTag').textContent = tagLabel[card.category];
    document.getElementById('modalTag').className = `tag ${tagClass[card.category]}`;
    document.getElementById('modalDate').textContent = card.date;
    document.getElementById('modalTitle').textContent = card.title;
    document.getElementById('modalSummary').textContent = card.summary_full || card.summary;
    document.getElementById('modalKeywords').innerHTML = (card.keywords || []).map(k => `<span class="keyword"># ${k}</span>`).join('');
    document.getElementById('modalSource').textContent = card.source;
    document.getElementById('modalLink').href = card.url || '#';
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) {
      document.getElementById('modalOverlay').classList.remove('open');
    }
  }

  function getSampleData() {
    const today = new Date().toLocaleDateString('ko-KR', {month:'long', day:'numeric'});
    return [
      {
        category: 'figma',
        title: 'Figma 최신 업데이트: AI 레이아웃 자동 제안 기능 출시',
        summary: 'Figma 공식 릴리즈 노트에 따르면, AI가 선택한 요소의 맥락을 파악해 최적 레이아웃을 자동으로 제안하는 기능이 추가됐습니다. 반복 정렬 작업 시간을 크게 줄여줄 것으로 기대됩니다.',
        summary_full: 'Figma 공식 릴리즈 노트에 따르면, AI가 선택한 요소의 맥락을 파악해 최적 레이아웃을 자동으로 제안하는 기능이 추가됐습니다. 반복 정렬 작업 시간을 크게 줄여줄 것으로 기대됩니다. 특히 오토레이아웃 설정을 AI가 자동 감지해 적용하는 부분이 실무에 큰 도움이 될 전망입니다.',
        keywords: ['Figma', 'AI', '오토레이아웃', '릴리즈'],
        source: 'figma.com/release-notes',
        date: today,
        url: 'https://www.figma.com/release-notes/'
      },
      {
        category: 'adobe',
        title: 'Adobe Firefly 4, 벡터 생성 기능 대폭 강화',
        summary: '어도비 공식 블로그가 발표한 Firefly 4 업데이트에서 AI 기반 벡터 일러스트 생성 기능이 크게 개선됐습니다. Illustrator와의 연동도 더욱 긴밀해졌습니다.',
        summary_full: '어도비 공식 블로그가 발표한 Firefly 4 업데이트에서 AI 기반 벡터 일러스트 생성 기능이 크게 개선됐습니다. Illustrator와의 연동도 더욱 긴밀해졌습니다. 특히 텍스트 프롬프트로 SVG 경로를 직접 생성하는 기능은 아이콘 제작 워크플로우를 완전히 바꿀 것으로 보입니다.',
        keywords: ['Adobe', 'Firefly', 'Illustrator', '벡터AI'],
        source: 'adobe.com/news',
        date: today,
        url: 'https://www.adobe.com/news'
      },
      {
