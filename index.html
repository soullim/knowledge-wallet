<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웹디자인팀 포털</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
@font-face{font-family:'Paperlogy';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-6SemiBold.woff2') format('woff2');font-weight:600}
@font-face{font-family:'Paperlogy';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-8ExtraBold.woff2') format('woff2');font-weight:800}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font:'Pretendard','Noto Sans KR',sans-serif;
  --ftitle:'Paperlogy','Pretendard',sans-serif;
  --accent:#6366F1;--accent-soft:#EEF2FF;
  --teal:#0F9B8E;
  --amber:#F59E0B;--amber-soft:#FFFBEB;
  --red:#EF4444;--red-soft:#FEF2F2;
  --green:#10B981;--green-soft:#ECFDF5;
  --blue:#3B82F6;--blue-soft:#EFF6FF;
  --border:#E2E8F0;--border2:#CBD5E1;
  --bg:#F8FAFC;--bg2:#F1F5F9;
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --white:#fff;
  --col-figma:#3a7d44;--col-adobe:#b84c1a;--col-industry:#7b3fa0;
  --col-design:#1a5fa0;--col-trend:#a06020;--col-frontend:#1a7a7a;--col-ai:#c2185b;
  --bg-figma:rgba(58,125,68,.09);--bg-adobe:rgba(184,76,26,.09);
  --bg-industry:rgba(123,63,160,.09);--bg-design:rgba(26,95,160,.09);
  --bg-trend:rgba(160,96,32,.09);--bg-frontend:rgba(26,122,122,.09);--bg-ai:rgba(194,24,91,.09);
}
html,body{font-family:var(--font);font-size:15px;background:var(--bg);color:var(--text);line-height:1.6}

/* NAV */
.gnav{background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.glogo{font-family:var(--ftitle);font-size:17px;font-weight:800;color:var(--accent);margin-right:2rem;white-space:nowrap;text-decoration:none}
.glogo span{color:var(--text)}
.gtabs{display:flex;height:100%}
.gtab{display:flex;align-items:center;gap:7px;padding:0 20px;font-size:15px;font-weight:600;color:var(--text2);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;font-family:var(--font);transition:color .15s}
.gtab:hover{color:var(--text)}
.gtab.on{color:var(--accent);border-bottom-color:var(--accent)}
.gright{margin-left:auto;display:flex;align-items:center;gap:10px}
.gdate{font-size:14px;color:var(--text3)}
.gsaved{font-size:14px;color:var(--green);display:none;align-items:center;gap:4px}
.gsaved.on{display:flex}

/* PAGE */
.page{display:none}
.page.on{display:block}

/* BTN */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:10px;border:1px solid var(--border2);background:var(--white);color:var(--text);font-size:14px;cursor:pointer;font-family:var(--font);font-weight:600;transition:background .12s}
.btn:hover{background:var(--bg2)}
.btn.pri{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.pri:hover{background:#4F46E5}
.btn.sm{font-size:13px;padding:5px 11px}
.btn.del{color:var(--red);border-color:#FECACA}
.btn.del:hover{background:var(--red-soft)}
.btn.tl{background:var(--teal);border-color:var(--teal);color:#fff}
.btn.tl:hover{background:#0C8278}

/* DASHBOARD */
#pg-db{padding:1.5rem;max-width:1100px;margin:0 auto}
.dbtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.dbtitle{font-family:var(--ftitle);font-size:22px;font-weight:800}
.dbsub{font-size:14px;color:var(--text3);margin-top:3px}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.25rem}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.kpi-lbl{font-size:14px;color:var(--text3);margin-bottom:4px}
.kpi-val{font-family:var(--ftitle);font-size:28px;font-weight:800;color:var(--text)}
.kpi-val.ok{color:var(--green)}.kpi-val.warn{color:var(--amber)}.kpi-val.danger{color:var(--red)}

.sec{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1.1rem 1.25rem;margin-bottom:1rem}
.sechd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:10px}
.sectitle{font-family:var(--ftitle);font-size:15px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:6px}

/* OPEN LIST */
.oi{display:flex;align-items:flex-start;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
.oi:last-child{border-bottom:none}
.oi-name{font-family:var(--ftitle);font-size:15px;font-weight:600}
.oi-note{font-size:14px;color:var(--text2);margin-top:3px}
.oi-member{font-size:14px;color:var(--text3);margin-top:2px}
.dday{font-size:13px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.dday.neg{background:var(--red-soft);color:var(--red)}
.dday.soon{background:var(--amber-soft);color:var(--amber)}
.dday.good{background:var(--green-soft);color:var(--green)}
.dday.tbd{background:var(--accent-soft);color:var(--accent)}
.badge{font-size:12px;padding:2px 8px;border-radius:20px;margin-left:6px}
.badge.delay{background:var(--red-soft);color:var(--red)}
.badge.ok{background:var(--green-soft);color:var(--green)}
.badge.tbd{background:var(--accent-soft);color:var(--accent)}

/* TIMELINE */
.leg{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.legi{display:flex;align-items:center;gap:4px;font-size:14px;color:var(--text2)}
.legdot{width:13px;height:13px;border-radius:3px}
.tlmonths{display:flex;margin-bottom:5px}
.tlmonth{font-size:13px;color:var(--text3);text-align:center}
.tlrow{margin-bottom:22px}
.tlmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;flex-wrap:wrap;gap:4px}
.tlname{font-family:var(--ftitle);font-size:14px;font-weight:600}
.tldates{font-size:13px;color:var(--text3)}
.tlwrap{position:relative;height:28px;margin-top:18px}
.tlbg{position:absolute;inset:0;background:var(--bg2);border-radius:4px}
.tlseg{position:absolute;top:4px;height:20px;border-radius:3px;font-size:12px;display:flex;align-items:center;padding:0 6px;white-space:nowrap;overflow:hidden}
.seg-d{background:#9FE1CB;color:#085041}.seg-p{background:#B5D4F4;color:#0C447C}
.seg-dev{background:#D3D1C7;color:#444}.seg-t{background:#FAC775;color:#633806}
.tltoday{position:absolute;top:-5px;width:2px;background:var(--red);height:38px;border-radius:1px;z-index:5}
.tltoday-lbl{position:absolute;top:-17px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--red);white-space:nowrap;font-weight:700}
.tlopen{position:absolute;top:0;width:2px;height:28px;background:var(--accent);border-radius:1px;z-index:4}
.tlopen-lbl{position:absolute;top:-17px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--accent);white-space:nowrap;font-weight:700}

/* REDMINE */
.rmtabs{display:flex;gap:6px;flex-wrap:wrap}
.rmtab{font-size:13px;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--white);color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .12s}
.rmtab:hover{border-color:var(--accent);color:var(--accent)}
.rmtab.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.rmtoolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px}
.rmtbl{width:100%;border-collapse:collapse;table-layout:fixed}
.rmtbl th{font-size:13px;color:var(--text3);font-weight:600;text-align:left;padding:7px 8px;border-bottom:1px solid var(--border)}
.rmtbl td{font-size:14px;padding:10px 8px;border-bottom:1px solid var(--border);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rmtbl tr:last-child td{border-bottom:none}
.rmtbl tr:hover td{background:var(--bg2)}
.stbdg{font-size:12px;padding:3px 10px;border-radius:20px;white-space:nowrap}
.st대기{background:var(--amber-soft);color:var(--amber)}
.st신규{background:var(--blue-soft);color:var(--blue)}
.st진행{background:var(--green-soft);color:var(--green)}
.st완료{background:#F0FDF4;color:#166534}
.stdefault{background:var(--bg2);color:var(--text2)}

/* MODAL */
.moverlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:300;align-items:center;justify-content:center;padding:20px}
.moverlay.on{display:flex}
.mbox{background:var(--white);border-radius:16px;padding:1.75rem;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.14)}
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.mtitle{font-family:var(--ftitle);font-size:18px;font-weight:800}
.fl{margin-bottom:12px}
.fl label{font-size:14px;color:var(--text2);margin-bottom:5px;display:block;font-weight:600}
.fi{width:100%;font-size:14px;padding:9px 12px;border-radius:10px;border:1px solid var(--border2);background:var(--white);color:var(--text);font-family:var(--font)}
.fi:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fsec{font-size:13px;font-weight:700;color:var(--text2);margin:16px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.factions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--border)}
.empty{text-align:center;padding:2rem;font-size:14px;color:var(--text3)}
.loadrow{text-align:center;padding:1.5rem;font-size:14px;color:var(--text3)}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:var(--text);color:#fff;font-size:14px;padding:11px 18px;border-radius:10px;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.on{opacity:1;transform:translateY(0)}

/* KNOWLEDGE */
#pg-kw{background:var(--bg)}
.kwtop{background:var(--white);border-bottom:1px solid var(--border);padding:0 1.5rem}
.kwtopin{max-width:1100px;margin:0 auto;height:50px;display:flex;align-items:center;justify-content:space-between}
.kwupd{font-size:14px;color:var(--text3)}
.kwrefresh{font-size:14px;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .2s}
.kwrefresh:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.kwfbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 1.5rem}
.kwfin{max-width:1100px;margin:0 auto;display:flex;gap:7px;padding:11px 0;overflow-x:auto;scrollbar-width:none}
.kwfin::-webkit-scrollbar{display:none}
.kwfbtn{white-space:nowrap;padding:6px 17px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:14px;font-family:var(--font);cursor:pointer;transition:all .18s;flex-shrink:0}
.kwfbtn:hover{border-color:var(--border2);color:var(--text);background:var(--bg2)}
.kwfbtn.on{font-weight:600;border-color:transparent}
.kwfbtn[data-c="all"].on{background:var(--text);color:#fff}
.kwfbtn[data-c="figma"].on{background:var(--col-figma);color:#fff}
.kwfbtn[data-c="adobe"].on{background:var(--col-adobe);color:#fff}
.kwfbtn[data-c="industry"].on{background:var(--col-industry);color:#fff}
.kwfbtn[data-c="design"].on{background:var(--col-design);color:#fff}
.kwfbtn[data-c="trend"].on{background:var(--col-trend);color:#fff}
.kwfbtn[data-c="frontend"].on{background:var(--col-frontend);color:#fff}
.kwfbtn[data-c="ai"].on{background:var(--col-ai);color:#fff}
.kwmain{max-width:1100px;margin:0 auto;padding:26px 1.5rem}
.kwmeta{display:flex;align-items:baseline;gap:10px;margin-bottom:20px}
.kwmetatitle{font-family:var(--ftitle);font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)}
.kwmetacnt{font-size:13px;color:var(--text3)}
.kwgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.kwcard{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;display:flex;flex-direction:column;animation:fadeup .35s ease both}
.kwcard:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.07);border-color:var(--border2)}
@keyframes fadeup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.kwbar{height:3px}
.kwbody{padding:17px 19px;flex:1;display:flex;flex-direction:column;gap:10px}
.kwtop2{display:flex;justify-content:space-between;align-items:center}
.kwchip{font-size:13px;font-weight:700;padding:3px 10px;border-radius:20px}
.kwdate{font-size:13px;color:var(--text3)}
.kwtitle{font-family:var(--ftitle);font-size:16px;font-weight:700;line-height:1.5;color:var(--text);word-break:keep-all}
.kwsummary{font-size:14px;color:var(--text2);line-height:1.7;word-break:keep-all;flex:1}
.kwkws{display:flex;flex-wrap:wrap;gap:5px}
.kwtag{font-size:13px;padding:3px 9px;border-radius:4px;background:var(--bg2);color:var(--text3);border:1px solid var(--border)}
.kwfoot{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--border);margin-top:auto}
.kwsrc{font-size:13px;color:var(--text3)}
.kwmore{font-size:13px;font-weight:600;color:var(--accent)}
.kwcard-figma .kwbar{background:var(--col-figma)}
.kwcard-adobe .kwbar{background:var(--col-adobe)}
.kwcard-industry .kwbar{background:var(--col-industry)}
.kwcard-design .kwbar{background:var(--col-design)}
.kwcard-trend .kwbar{background:var(--col-trend)}
.kwcard-frontend .kwbar{background:var(--col-frontend)}
.kwcard-ai .kwbar{background:var(--col-ai)}
.chip-figma{background:var(--bg-figma);color:var(--col-figma)}
.chip-adobe{background:var(--bg-adobe);color:var(--col-adobe)}
.chip-industry{background:var(--bg-industry);color:var(--col-industry)}
.chip-design{background:var(--bg-design);color:var(--col-design)}
.chip-trend{background:var(--bg-trend);color:var(--col-trend)}
.chip-frontend{background:var(--bg-frontend);color:var(--col-frontend)}
.chip-ai{background:var(--bg-ai);color:var(--col-ai)}
.kwloading{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text3);font-size:14px}
.dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin:0 3px;animation:dot 1.2s infinite;opacity:.3}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:translateY(0);opacity:.3}40%{transform:translateY(-7px);opacity:1}}

/* KW MODAL */
.kwmovl{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:500;align-items:center;justify-content:center;padding:20px}
.kwmovl.on{display:flex}
.kwmpanel{background:var(--white);border:1px solid var(--border);border-radius:16px;max-width:580px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.14);animation:mIn .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes mIn{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.kwmacc{height:4px;border-radius:16px 16px 0 0}
.kwmin{padding:26px 28px 28px}
.kwmhd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.kwmmeta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.kwmclose{width:32px;height:32px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text2);transition:background .15s}
.kwmclose:hover{background:var(--border);color:var(--text)}
.kwmdate{font-size:14px;color:var(--text3)}
.kwmtitle{font-family:var(--ftitle);font-size:20px;font-weight:800;line-height:1.45;color:var(--text);word-break:keep-all;margin:0 0 7px}
.kwmsrcrow{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.kwmsrcdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.kwmsrctxt{font-size:14px;color:var(--text3)}
.kwmdiv{border:none;border-top:1px solid var(--border);margin:18px 0}
.kwmlbl{font-size:13px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);margin:0 0 9px}
.kwmsum{font-size:16px;color:var(--text);line-height:1.85;word-break:keep-all}
.kwmpts{list-style:none;display:flex;flex-direction:column;gap:10px}
.kwmpts li{display:flex;gap:10px;align-items:flex-start;font-size:15px;color:var(--text2);line-height:1.65}
.kwmpt-dot{width:7px;height:7px;border-radius:50%;margin-top:8px;flex-shrink:0}
.kwmkws{display:flex;flex-wrap:wrap;gap:6px}
.kwmkw{font-size:14px;padding:5px 12px;border-radius:20px;background:var(--bg2);color:var(--text2);border:1px solid var(--border)}
.kwmfoot{display:flex;justify-content:space-between;align-items:center;padding-top:18px;border-top:1px solid var(--border);margin-top:5px}
.kwmgo{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:700;padding:11px 22px;border-radius:10px;background:var(--accent);color:#fff;text-decoration:none;font-family:var(--font);border:none;cursor:pointer;transition:background .18s,transform .15s}
.kwmgo:hover{background:#4F46E5;transform:translateY(-1px)}
.kwmshare{font-size:14px;color:var(--text2);background:var(--white);border:1px solid var(--border2);border-radius:10px;padding:10px 16px;cursor:pointer;font-family:var(--font);transition:all .15s}
.kwmshare:hover{border-color:var(--border2);background:var(--bg2)}

@media(max-width:640px){
  .kpi-row{grid-template-columns:1fr 1fr}
  .kwgrid{grid-template-columns:1fr}
  .f2{grid-template-columns:1fr}
  .gtab span{display:none}
}
</style>
</head>
<body>

<nav class="gnav">
  <a class="glogo" href="#">웹디자인팀<span> 포털</span></a>
  <div class="gtabs">
    <button class="gtab on" id="tab-db" onclick="goPage('db')"><i class="ti ti-layout-dashboard"></i><span> 업무 대시보드</span></button>
    <button class="gtab" id="tab-kw" onclick="goPage('kw')"><i class="ti ti-bulb"></i><span> 지식지갑</span></button>
  </div>
  <div class="gright">
    <span class="gsaved" id="gsaved"><i class="ti ti-device-floppy"></i> 저장됨</span>
    <span class="gdate" id="gdate"></span>
  </div>
</nav>

<!-- ═══ 대시보드 ═══ -->
<div id="pg-db" class="page on">
  <div class="dbtop">
    <div>
      <div class="dbtitle">프로젝트 일정 대시보드</div>
      <div class="dbsub">기획리뷰 후 일정을 등록하고 오픈일까지 진행 현황을 관리해요</div>
    </div>
    <button class="btn pri" onclick="openProjForm()"><i class="ti ti-plus"></i> 프로젝트 추가</button>
  </div>
  <div class="kpi-row" id="kpi"></div>
  <div class="sec">
    <div class="sechd"><span class="sectitle"><i class="ti ti-calendar-event"></i> 오픈일 D-Day 현황</span></div>
    <div id="openlist"></div>
  </div>
  <div class="sec">
    <div class="sechd"><span class="sectitle"><i class="ti ti-timeline"></i> 일정 타임라인</span></div>
    <div class="leg">
      <div class="legi"><div class="legdot" style="background:#9FE1CB"></div>디자인</div>
      <div class="legi"><div class="legdot" style="background:#B5D4F4"></div>퍼블</div>

<script>
/* ══════════════ 유틸 ══════════════ */
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
document.getElementById('gdate').textContent = TODAY.getFullYear()+'.'+(TODAY.getMonth()+1)+'.'+TODAY.getDate();

function fmtD(d){ return (d.getMonth()+1)+'/'+d.getDate(); }
function fmtI(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseD(s){ var p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function isReal(s){ return s && s!=='none' && s!=='tbd'; }
function ddayOf(d){
  var diff=Math.round((d-TODAY)/86400000);
  if(diff===0) return {t:'D-Day',c:'tbd'};
  if(diff>0) return {t:'D-'+diff,c:diff<=7?'soon':'good'};
  return {t:'D+'+Math.abs(diff),c:'neg'};
}
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('on');
  setTimeout(function(){ el.classList.remove('on'); },2200);
}
function showSaved(){
  var el=document.getElementById('gsaved');
  el.classList.add('on'); setTimeout(function(){ el.classList.remove('on'); },2000);
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ══════════════ 페이지 전환 ══════════════ */
var kwInited=false;
function goPage(id){
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('on'); });
  document.querySelectorAll('.gtab').forEach(function(t){ t.classList.remove('on'); });
  document.getElementById('pg-'+id).classList.add('on');
  document.getElementById('tab-'+id).classList.add('on');
  if(id==='kw' && !kwInited){ kwLoad(); kwInited=true; }
}

/* ══════════════ 로컬스토리지 ══════════════ */
var LS_P='wd_p', LS_R='wd_r', LS_M='wd_m', LS_INIT='wd_init';
function lsSave(){
  try{
    localStorage.setItem(LS_INIT,'1');
    localStorage.setItem(LS_P, JSON.stringify(projects));
    localStorage.setItem(LS_R, JSON.stringify(rmCfg));
    localStorage.setItem(LS_M, JSON.stringify(rmIssues.filter(function(i){ return i._m; })));
    showSaved();
  }catch(e){}
}
function lsLoad(){
  try{
    var p=localStorage.getItem(LS_P); if(p) projects=JSON.parse(p);
    var r=localStorage.getItem(LS_R); if(r) rmCfg=Object.assign({},rmCfg,JSON.parse(r));
    var m=localStorage.getItem(LS_M); if(m) rmIssues=JSON.parse(m);
    if(projects.length) nextPid=Math.max.apply(null,projects.map(function(x){ return x.id; }))+1;
  }catch(e){}
}

/* ══════════════ 데이터 ══════════════ */
var projects=[], nextPid=1;
var rmCfg={ url:'http://10.30.100.24', key:'', proj:'hb_design', waitSt:'대기,신규' };
var rmIssues=[], rmFilter='대기', rmFetched=false;
var editProjId=null;

function makeSample(){
  var t=TODAY;
  function d(n){ var x=new Date(t); x.setDate(x.getDate()+n); return fmtI(x); }
  return [
    {id:1,name:'초등 수학 앱 개선',open:d(7),
     design:[d(-15),d(-7)],pub:[d(-7),d(1)],dev:[d(-10),d(3)],test:[d(0),d(6)],
     members:'김민지, 박준호',note:'기획리뷰 완료. 디자인 QA 필요.'},
    {id:2,name:'중등 국어 LMS UI',open:'tbd',
     design:[d(-5),d(4)],pub:['tbd','tbd'],dev:['none','none'],test:['none','none'],
     members:'이수현, 최유나',note:''}
  ];
}

lsLoad();
if(!localStorage.getItem(LS_INIT)){ projects=makeSample(); nextPid=3; lsSave(); }

/* ══════════════ 대시보드 렌더 ══════════════ */
function renderDB(){ renderKPI(); renderOpenList(); renderTimeline(); renderRM(); }

function renderKPI(){
  var over=0,warn=0,month=0;
  projects.forEach(function(p){
    if(!isReal(p.open)) return;
    var d=parseD(p.open), diff=Math.round((d-TODAY)/86400000);
    if(diff<0) over++;
    if(diff>=0&&diff<=7) warn++;
    if(d.getMonth()===TODAY.getMonth()&&d.getFullYear()===TODAY.getFullYear()) month++;
  });
  document.getElementById('kpi').innerHTML=
    '<div class="kpi"><div class="kpi-lbl">전체 프로젝트</div><div class="kpi-val">'+projects.length+'</div></div>'+
    '<div class="kpi"><div class="kpi-lbl">이번 달 오픈</div><div class="kpi-val ok">'+month+'</div></div>'+
    '<div class="kpi"><div class="kpi-lbl">딜레이 위험</div><div class="kpi-val warn">'+warn+'</div></div>'+
    '<div class="kpi"><div class="kpi-lbl">오픈 초과</div><div class="kpi-val danger">'+over+'</div></div>';
}

function renderOpenList(){
  var el=document.getElementById('openlist');
  if(!projects.length){ el.innerHTML='<div class="empty">등록된 프로젝트가 없어요</div>'; return; }
  var sorted=[].concat(projects).sort(function(a,b){
    var av=isReal(a.open)?parseD(a.open).getTime():Infinity;
    var bv=isReal(b.open)?parseD(b.open).getTime():Infinity;
    return av-bv;
  });
  el.innerHTML=sorted.map(function(p){
    var tbdOpen=!isReal(p.open);
    var dd=tbdOpen?{t:'미정',c:'tbd'}:ddayOf(parseD(p.open));
    var delay=!tbdOpen&&Math.round((parseD(p.open)-TODAY)/86400000)<0;
    var bcls=tbdOpen?'tbd':delay?'delay':'ok';
    var btxt=tbdOpen?'미정':delay?'딜레이':'정상';
    return '<div class="oi">'+
      '<div style="flex:1;min-width:0">'+
        '<div><span class="oi-name">'+esc(p.name)+'</span>'+
          '<span style="font-size:13px;color:var(--text3);margin-left:6px">오픈 '+(tbdOpen?'미정':fmtD(parseD(p.open)))+'</span>'+
          '<span class="badge '+bcls+'">'+btxt+'</span></div>'+
        (p.note?'<div class="oi-note"><i class="ti ti-notes" style="font-size:13px"></i> '+esc(p.note)+'</div>':'')+
        '<div class="oi-member">담당: '+(p.members||'—')+'</div>'+
      '</div>'+
      '<div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:12px">'+
        '<span class="dday '+dd.c+'">'+dd.t+'</span>'+
        '<button class="btn sm" onclick="openProjForm('+p.id+')"><i class="ti ti-edit"></i></button>'+
        '<button class="btn sm del" onclick="delProj('+p.id+')"><i class="ti ti-trash"></i></button>'+
      '</div>'+
    '</div>';
  }).join('');
}

function renderTimeline(){
  if(!projects.length){
    document.getElementById('timeline').innerHTML='<div class="empty">등록된 프로젝트가 없어요</div>';
    document.getElementById('tlmonths').innerHTML=''; return;
  }
  var mn=new Date(TODAY), mx=new Date(TODAY);
  projects.forEach(function(p){
    [p.design,p.pub,p.dev,p.test].forEach(function(r){
      if(!r||!isReal(r[0])||!isReal(r[1])) return;
      try{ var a=parseD(r[0]),b=parseD(r[1]); if(a<mn)mn=new Date(a); if(b>mx)mx=new Date(b); }catch(e){}
    });
    if(isReal(p.open)){ try{ var od=parseD(p.open); if(od<mn)mn=new Date(od); if(od>mx)mx=new Date(od); }catch(e){} }
  });
  mn.setDate(mn.getDate()-4); mx.setDate(mx.getDate()+8);
  var TOTAL=Math.max(1,Math.round((mx-mn)/86400000));
  function pct(s){ return (Math.round((parseD(s)-mn)/86400000)/TOTAL*100).toFixed(2)+'%'; }
  function wpct(s,e){ return Math.max(0.5,(Math.round((parseD(e)-parseD(s))/86400000)/TOTAL*100)).toFixed(2)+'%'; }
  var todayP=(Math.round((TODAY-mn)/86400000)/TOTAL*100).toFixed(2);
  var mhdr=document.getElementById('tlmonths'); mhdr.innerHTML='';
  var cur=new Date(mn.getFullYear(),mn.getMonth(),1);
  while(cur<=mx){
    var me=new Date(cur.getFullYear(),cur.getMonth()+1,0);
    var vs=cur<mn?mn:cur, ve=me>mx?mx:me;
    var w=(Math.round((ve-vs)/86400000)+1)/TOTAL*100;
    var dd=document.createElement('div'); dd.className='tlmonth'; dd.style.width=w.toFixed(1)+'%';
    dd.textContent=(cur.getMonth()+1)+'월'; mhdr.appendChild(dd);
    cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);
  }
  var html='';
  var sorted=[].concat(projects).sort(function(a,b){
    var av=isReal(a.open)?parseD(a.open).getTime():Infinity;
    var bv=isReal(b.open)?parseD(b.open).getTime():Infinity;
    return av-bv;
  });
  sorted.forEach(function(p){
    var tbdOpen=!isReal(p.open);
    var delay=!tbdOpen&&Math.round((parseD(p.open)-TODAY)/86400000)<0;
    var bcls=tbdOpen?'tbd':delay?'delay':'ok';
    var btxt=tbdOpen?'미정':delay?'딜레이':'정상';
    var opP=tbdOpen?null:(Math.round((parseD(p.open)-mn)/86400000)/TOTAL*100).toFixed(2);
    var endTxt=''; var openTxt='오픈 '+(tbdOpen?'미정':fmtD(parseD(p.open)));
    if(isReal(p.test&&p.test[1])) endTxt='엔딩 '+fmtD(parseD(p.test[1]))+' → ';
    html+='<div class="tlrow">'+
      '<div class="tlmeta">'+
        '<span class="tlname">'+esc(p.name)+'<span class="badge '+bcls+'" style="margin-left:7px">'+btxt+'</span></span>'+
        '<span class="tldates">'+endTxt+openTxt+'</span>'+
      '</div>'+
      '<div class="tlwrap">'+
        '<div class="tlbg"></div>'+
        (isReal(p.design&&p.design[0])&&isReal(p.design[1])?'<div class="tlseg seg-d" style="left:'+pct(p.design[0])+';width:'+wpct(p.design[0],p.design[1])+'">디자인</div>':'')+
        (isReal(p.pub&&p.pub[0])&&isReal(p.pub[1])?'<div class="tlseg seg-p" style="left:'+pct(p.pub[0])+';width:'+wpct(p.pub[0],p.pub[1])+'">퍼블</div>':'')+
        (isReal(p.dev&&p.dev[0])&&isReal(p.dev[1])?'<div class="tlseg seg-dev" style="left:'+pct(p.dev[0])+';width:'+wpct(p.dev[0],p.dev[1])+'">개발</div>':'')+
        (isReal(p.test&&p.test[0])&&isReal(p.test[1])?'<div class="tlseg seg-t" style="left:'+pct(p.test[0])+';width:'+wpct(p.test[0],p.test[1])+'">테스트</div>':'')+
        (opP!==null?'<div class="tlopen" style="left:'+opP+'%"><span class="tlopen-lbl">오픈 '+fmtD(parseD(p.open))+'</span></div>':'')+
        '<div class="tltoday" style="left:'+todayP+'%"><span class="tltoday-lbl">오늘</span></div>'+
      '</div>'+
    '</div>';
  });
  document.getElementById('timeline').innerHTML=html;
}

/* ══════════════ 레드마인 ══════════════ */
function renderRM(){
  var area=document.getElementById('rmarea');
  var waitSts=rmCfg.waitSt.split(',').map(function(s){ return s.trim(); });
  var filtered=rmFilter==='전체'?rmIssues:rmIssues.filter(function(i){ return i.status&&i.status.name===rmFilter; });
  var wc=rmIssues.filter(function(i){ return i.status&&waitSts.indexOf(i.status.name)>=0; }).length;
  document.getElementById('rmbadge').textContent='대기 '+wc+'건';
  var sts=['대기','신규','진행','완료','전체'];
  var extra=rmIssues.map(function(i){ return i.status&&i.status.name; }).filter(function(s){ return s&&sts.indexOf(s)<0; });
  extra.forEach(function(s){ if(sts.indexOf(s)<0) sts.splice(sts.length-1,0,s); });
  var tabs='<div class="rmtabs">'+sts.map(function(s){
    return '<button class="rmtab'+(rmFilter===s?' on':'')+'" onclick="rmSetFilter(\''+s+'\')">'+s+'</button>';
  }).join('')+'</div>';
  if(!rmFetched){ area.innerHTML=tabs+'<div class="loadrow">레드마인 일감 불러오는 중...</div>'; rmFetch(false); return; }
  if(!filtered.length){ area.innerHTML='<div class="rmtoolbar">'+tabs+'</div><div class="empty">'+esc(rmFilter)+' 상태 일감이 없어요</div>'; return; }
  area.innerHTML='<div class="rmtoolbar">'+tabs+'<span style="font-size:14px;color:var(--text2)">'+esc(rmFilter)+' <strong>'+filtered.length+'</strong>건</span></div>'+
    '<table class="rmtbl"><thead><tr>'+
      '<th style="width:40px"></th>'+
      '<th style="width:50px">번호</th>'+
      '<th>제목</th>'+
      '<th style="width:70px">담당자</th>'+
      '<th style="width:80px">시작일</th>'+
      '<th style="width:80px">종료일</th>'+
      '<th style="width:38px"></th>'+
    '</tr></thead><tbody>'+
    filtered.map(function(i){
      var done=i._done||false;
      var st=i.status&&i.status.name||'대기';
      var stcls='st'+(st.match(/[가-힣A-Za-z]+/)?st:'default');
      return '<tr style="'+(done?'opacity:.45':'')+'">'+
        '<td style="text-align:center"><input type="checkbox"'+(done?' checked':'')+' onchange="rmToggle('+i.id+',this.checked)" style="width:16px;height:16px;cursor:pointer;accent-color:var(--green)"></td>'+
        '<td style="color:var(--text3)">#'+i.id+'</td>'+
        '<td title="'+esc(i.subject)+'" style="'+(done?'text-decoration:line-through;color:var(--text3)':'')+'">'+esc(i.subject)+'</td>'+
        '<td style="color:var(--text2)">'+(i.assigned_to&&i.assigned_to.name||'미배정')+'</td>'+
        '<td style="color:var(--text3)">'+(i.start_date||'—')+'</td>'+
        '<td style="color:var(--text3)">'+(i.due_date||'—')+'</td>'+
        '<td><button class="btn sm del" onclick="rmDel('+i.id+')"><i class="ti ti-x"></i></button></td>'+
      '</tr>';
    }).join('')+
    '</tbody></table>';
}

function rmSetFilter(s){ rmFilter=s; renderRM(); }
function rmToggle(id,v){
  var i=rmIssues.find(function(x){ return x.id===id; });
  if(i){ i._done=v; if(v) i.status={name:'완료'}; else if(i._m) i.status={name:'대기'}; lsSave(); renderRM(); }
}
function rmDel(id){
  if(!confirm('이 일감을 삭제할까요?')) return;
  rmIssues=rmIssues.filter(function(x){ return x.id!==id; });
  lsSave(); renderRM(); toast('일감을 삭제했어요');
}
function rmRefresh(){ rmFetch(true); }
async function rmFetch(manual){
  if(manual){ document.getElementById('rmarea').innerHTML='<div class="loadrow">불러오는 중...</div>'; }
  if(!rmCfg.key){ rmFetched=true; renderRM(); return; }
  try{
    var r=await fetch(rmCfg.url+'/projects/'+rmCfg.proj+'/issues.json?key='+rmCfg.key+'&limit=100&status_id=open');
    if(!r.ok){ rmFetched=true; renderRM(); return; }
    var data=await r.json();
    rmIssues=rmIssues.filter(function(i){ return i._m; }).concat(data.issues||[]);
    rmFetched=true; lsSave(); renderRM();
    if(manual) toast('레드마인 일감을 불러왔어요');
  }catch(e){ rmFetched=true; renderRM(); if(manual) toast('연결 실패 — 사내 PC에서 실행해주세요'); }
}

/* ══════════════ 프로젝트 폼 ══════════════ */
function openProjForm(id){
  editProjId=id||null;
  var p=id?projects.find(function(x){ return x.id===id; }):{};
  var t=fmtI(TODAY);
  document.getElementById('proj-mtitle').textContent=id?'프로젝트 수정':'프로젝트 추가';
  function stv(arr){
    if(!arr||arr[0]==='none') return 'none';
    if(arr[0]==='tbd') return 'tbd';
    return 'scheduled';
  }
  function sv(arr){ return (arr&&isReal(arr[0]))?arr[0]:t; }
  function ev(arr){ return (arr&&isReal(arr[1]))?arr[1]:t; }
  function makeStageRow(lbl, pfx, arr){
    var cur=stv(arr);
    return '<div class="fl"><label>'+lbl+'</label>'+
      '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'+
        '<select class="fi" id="st-'+pfx+'" onchange="stToggle(\''+pfx+'\')" style="width:110px;flex-shrink:0">'+
          '<option value="none"'+(cur==='none'?' selected':'')+'>미진행</option>'+
          '<option value="tbd"'+(cur==='tbd'?' selected':'')+'>미정</option>'+
          '<option value="scheduled"'+(cur==='scheduled'?' selected':'')+'>일정</option>'+
        '</select>'+
        '<div id="sw-'+pfx+'" style="display:'+(cur==='scheduled'?'flex':'none')+';gap:6px;flex:1;min-width:180px;align-items:center">'+
          '<input class="fi" type="date" id="s-'+pfx+'" value="'+sv(arr)+'" style="flex:1">'+
          '<span style="color:var(--text3);flex-shrink:0">~</span>'+
          '<input class="fi" type="date" id="e-'+pfx+'" value="'+ev(arr)+'" style="flex:1">'+
        '</div>'+
      '</div>'+
    '</div>';
  }
  var openTbd=!isReal(p.open);
  document.getElementById('proj-mbody').innerHTML=
    '<div class="fl"><label>프로젝트명 *</label><input class="fi" id="f-name" value="'+esc(p.name||'')+'" placeholder="예: 수학 앱 개선"></div>'+
    '<div class="fl"><label>오픈일</label>'+
      '<div style="display:flex;gap:8px;align-items:center">'+
        '<select class="fi" id="f-otyp" onchange="openToggle()" style="width:110px;flex-shrink:0">'+
          '<option value="tbd"'+(openTbd?' selected':'')+'>미정</option>'+
          '<option value="date"'+(!openTbd?' selected':'')+'>일정</option>'+
        '</select>'+
        '<input class="fi" type="date" id="f-open" value="'+(!openTbd&&p.open?p.open:t)+'" style="flex:1;display:'+(!openTbd?'block':'none')+'">'+
      '</div>'+
    '</div>'+
    '<div class="fsec">단계별 기간</div>'+
    makeStageRow('디자인','d',p.design)+
    makeStageRow('퍼블','p',p.pub)+
    makeStageRow('개발','dev',p.dev)+
    makeStageRow('테스트','t',p.test)+
    '<div class="fsec">추가 정보</div>'+
    '<div class="fl"><label>담당자 <span style="font-weight:400;color:var(--text3)">(쉼표로 구분)</span></label><input class="fi" id="f-members" value="'+esc(p.members||'')+'" placeholder="예: 김민지, 박준호"></div>'+
    '<div class="fl"><label>비고</label><textarea class="fi" id="f-note" rows="2" placeholder="특이사항">'+esc(p.note||'')+'</textarea></div>';
  document.getElementById('proj-modal').classList.add('on');

function stToggle(pfx){
  var sel=document.getElementById('st-'+pfx);
  var wrap=document.getElementById('sw-'+pfx);
  if(sel&&wrap) wrap.style.display=sel.value==='scheduled'?'flex':'none';
}
function openToggle(){
  var sel=document.getElementById('f-otyp');
  var inp=document.getElementById('f-open');
  if(sel&&inp) inp.style.display=sel.value==='date'?'block':'none';
}
function projMDismiss(){ document.getElementById('proj-modal').classList.remove('on'); }
function projMClose(e){ if(e.target===document.getElementById('proj-modal')) projMDismiss(); }

function projMSave(){
  var name=document.getElementById('f-name').value.trim();
  if(!name){ alert('프로젝트명을 입력해주세요.'); return; }
  var otyp=document.getElementById('f-otyp').value;
  var open=otyp==='tbd'?'tbd':(document.getElementById('f-open').value||'tbd');
  function getStage(pfx){
    var st=document.getElementById('st-'+pfx).value;
    if(st==='none') return ['none','none'];
    if(st==='tbd')  return ['tbd','tbd'];
    return [document.getElementById('s-'+pfx).value||fmtI(TODAY), document.getElementById('e-'+pfx).value||fmtI(TODAY)];
  }
  var obj={
    name:name, open:open,
    design:getStage('d'), pub:getStage('p'), dev:getStage('dev'), test:getStage('t'),
    members:document.getElementById('f-members').value,
    note:document.getElementById('f-note').value
  };
  if(!editProjId){ obj.id=nextPid++; projects.push(obj); }
  else{ var idx=projects.findIndex(function(x){ return x.id===editProjId; }); if(idx>=0){obj.id=editProjId;projects[idx]=obj;} }
  lsSave(); projMDismiss(); renderDB();
  toast(editProjId?'프로젝트를 수정했어요':'프로젝트를 추가했어요');
}

function delProj(id){
  if(!confirm('이 프로젝트를 삭제할까요?\n삭제 후 새로고침해도 복원되지 않아요.')) return;
  projects=projects.filter(function(x){ return x.id!==id; });
  lsSave(); renderDB(); toast('프로젝트를 삭제했어요');
}

/* ══════════════ 지식지갑 ══════════════ */
var KW_LABEL={figma:'피그마 신기능',adobe:'어도비 신기능',ai:'🤖 AI 뉴스',industry:'업계동향',design:'디자인',trend:'트렌드',frontend:'프론트엔드'};
var KW_COLOR={figma:'#3a7d44',adobe:'#b84c1a',ai:'#c2185b',industry:'#7b3fa0',design:'#1a5fa0',trend:'#a06020',frontend:'#1a7a7a'};
var kwCards=[], kwCurFilter='all';
var LS_KW='wd_kw_articles'; // 누적 기사 저장 키

// 로컬스토리지에서 누적 기사 불러오기
function kwLsLoad(){
  try{
    var s=localStorage.getItem(LS_KW);
    if(s) kwCards=JSON.parse(s);
  }catch(e){}
}

// 새 기사를 기존 누적 데이터에 병합 (title 기준 중복 제거, 최신 유지)
function kwMerge(newArticles){
  var map={};
  // 기존 데이터 먼저 맵에 등록
  kwCards.forEach(function(a){ map[a.title]=a; });
  // 새 데이터로 덮어쓰기 (최신 내용 우선)
  newArticles.forEach(function(a){ map[a.title]=a; });
  // collectedAt 기준 최신순 정렬
  kwCards=Object.values(map).sort(function(a,b){
    var da=a.publishedAt||a.collectedAt||a.date||'';
    var db=b.publishedAt||b.collectedAt||b.date||'';
    return db.localeCompare(da);
  });
  try{ localStorage.setItem(LS_KW, JSON.stringify(kwCards)); }catch(e){}
}

// 누적 기사 초기화
function kwClearStorage(){
  if(!confirm('저장된 모든 지식지갑 기사를 초기화할까요?\n삭제 후 새로고침 시 최신 데이터만 표시돼요.')) return;
  localStorage.removeItem(LS_KW);
  kwCards=[];
  kwLoad();
  toast('지식지갑 기사를 초기화했어요');
}

async function kwLoad(){
  // 기존 누적 데이터 먼저 표시 (빠른 렌더링)
  kwLsLoad();
  if(kwCards.length>0){
    kwRender();
    document.getElementById('kwupd').textContent='불러오는 중...';
  } else {
    document.getElementById('kwgrid').innerHTML='<div class="kwloading"><div class="dots"><span></span><span></span><span></span></div><p style="margin-top:14px">뉴스를 불러오는 중이에요</p></div>';
  }

  // 새 데이터 fetch 후 누적 병합
  var sources=[
    'news.json?t='+Date.now(),
    'https://soullim.github.io/knowledge-wallet/news.json?t='+Date.now()
  ];
  var fetched=false;
  for(var i=0;i<sources.length;i++){
    try{
      var res=await fetch(sources[i]);
      if(!res.ok) continue;
      var data=await res.json();
      var articles=data.articles||[];
      if(articles.length>0){
        kwMerge(articles); // 누적 병합
        var now=new Date().toLocaleDateString('ko-KR',{month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
        document.getElementById('kwupd').textContent='마지막 업데이트: '+now+' · 총 '+kwCards.length+'개';
        fetched=true; break;
      }
    }catch(e){ continue; }
  }

  if(!fetched){
    // fetch 실패 시 누적 데이터 그대로 유지, 없으면 샘플
    if(kwCards.length===0){
      kwCards=kwSample();
      document.getElementById('kwupd').textContent='샘플 데이터 (연결 실패)';
    } else {
      document.getElementById('kwupd').textContent='오프라인 · 누적 '+kwCards.length+'개';
    }
  }
  kwRender();
}

function kwRender(){
  var filtered=kwCurFilter==='all'?kwCards:kwCards.filter(function(c){ return c.category===kwCurFilter; });
  var list=[].concat(filtered).sort(function(a,b){
    var da=a.publishedAt||a.collectedAt||'', db=b.publishedAt||b.collectedAt||'';
    return db.localeCompare(da);
  });
  document.getElementById('kwcnt').textContent=list.length+'개';
  if(!list.length){ document.getElementById('kwgrid').innerHTML='<div class="kwloading" style="color:var(--text3)">해당 분야의 뉴스가 없어요</div>'; return; }
  document.getElementById('kwgrid').innerHTML=list.map(function(card,i){
    var idx=kwCards.indexOf(card);
    return '<article class="kwcard kwcard-'+card.category+'" style="animation-delay:'+(i*.04)+'s" onclick="kwOpen('+idx+')">'+
      '<div class="kwbar"></div>'+
      '<div class="kwbody">'+
        '<div class="kwtop2">'+
          '<span class="kwchip chip-'+card.category+'">'+(KW_LABEL[card.category]||card.category)+'</span>'+
          '<span class="kwdate">'+(card.date||'')+'</span>'+
        '</div>'+
        '<p class="kwtitle">'+esc(card.title)+'</p>'+
        '<p class="kwsummary">'+esc(card.summary)+'</p>'+
        '<div class="kwkws">'+(card.keywords||[]).map(function(k){ return '<span class="kwtag"># '+esc(k)+'</span>'; }).join('')+'</div>'+
        '<div class="kwfoot"><span class="kwsrc">'+esc(card.source)+'</span><span class="kwmore">자세히 보기 →</span></div>'+
      '</div>'+
    '</article>';
  }).join('');
}

function kwSetFilter(cat,btn){
  kwCurFilter=cat;
  document.querySelectorAll('.kwfbtn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  kwRender();
}

function kwOpen(idx){
  var c=kwCards[idx]; if(!c) return;
  var col=KW_COLOR[c.category]||'#888';
  document.getElementById('kwacc').style.background=col;
  document.getElementById('kwmsrcdot').style.background=col;
  document.getElementById('kwmchip').textContent=KW_LABEL[c.category]||c.category;
  document.getElementById('kwmchip').className='kwchip chip-'+c.category;
  document.getElementById('kwmdate').textContent=c.date||'';
  document.getElementById('kwmtitle').textContent=c.title||'';
  document.getElementById('kwmsrc').textContent=c.source||'';
  document.getElementById('kwmlink').href=c.url||'#';
  document.getElementById('kwmsum').textContent=c.summary||'';
  var full=c.summary_full||c.summary||'';
  var sents=full.split(/(?<=[.!?])\s+/).filter(function(s){ return s.trim().length>5; });
  document.getElementById('kwmpts').innerHTML=sents.map(function(s){
    return '<li><span class="kwmpt-dot" style="background:'+col+';opacity:.5"></span><span>'+esc(s.trim())+'</span></li>';
  }).join('')||('<li><span class="kwmpt-dot" style="background:'+col+';opacity:.5"></span><span>'+esc(full)+'</span></li>');
  document.getElementById('kwmkws').innerHTML=(c.keywords||[]).map(function(k){ return '<span class="kwmkw"># '+esc(k)+'</span>'; }).join('');
  window._kwUrl=c.url||location.href;
  document.getElementById('kwmovl').classList.add('on');
  document.body.style.overflow='hidden';
}
function kwMClose(e){ if(e.target===document.getElementById('kwmovl')) kwMDismiss(); }
function kwMDismiss(){ document.getElementById('kwmovl').classList.remove('on'); document.body.style.overflow=''; }
function kwCopy(){
  navigator.clipboard.writeText(window._kwUrl||location.href).then(function(){
    var btn=document.querySelector('.kwmshare');
    var orig=btn.textContent; btn.textContent='✅ 복사됐어요!';
    setTimeout(function(){ btn.textContent=orig; },2000);
  });
}
