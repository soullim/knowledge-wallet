name: 매일 뉴스 자동 수집

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 오전 9시 (한국시간 = UTC 0시)
  workflow_dispatch:       # 수동 실행 버튼 활성화

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 저장소 코드 가져오기
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      # 2. Node.js 설치
      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. 뉴스 수집 + OpenAI 요약 실행
      - name: 뉴스 수집 실행
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node fetch-news.js

      # 4. news.json 커밋 → Netlify가 자동 감지해서 배포
      - name: news.json 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --staged --quiet || git commit -m "📰 뉴스 자동 업데이트 $(date +'%Y-%m-%d')"
          git push
