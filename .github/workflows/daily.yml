name: 매일 뉴스 자동 수집

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 오전 9시 (한국시간 = UTC 0시)
  workflow_dispatch:       # 수동 실행 버튼도 활성화

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 저장소 코드 가져오기
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      # 2. Node.js 설치
      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. 뉴스 수집 + Gemini 요약 실행
      - name: 뉴스 수집 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node fetch-news.js

      # 4. 생성된 news.json 저장소에 커밋
      - name: news.json 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --staged --quiet || git commit -m "📰 뉴스 자동 업데이트 $(date +'%Y-%m-%d')"
          git push

      # 5. Netlify에 자동 배포
      - name: Netlify 배포
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir . --auth $NETLIFY_AUTH_TOKEN --site $NETLIFY_SITE_ID
